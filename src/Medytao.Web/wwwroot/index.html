<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medytao</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <script>
        // Preload zapisanego motywu przed załadowaniem CSS — żeby przy reloadzie
        // ciemny motyw nie "błysnął" jasnym kolorem. Klucz synchronizowany
        // z ThemeService (medytao.theme) i theme.js (medytaoTheme.apply).
        // Wartość w localStorage to surowy JSON stringa, tj. z cudzysłowami:
        // "dark" lub "light". Blazored.LocalStorage tak właśnie to zapisuje.
        try {
            var raw = localStorage.getItem('medytao.theme');
            if (raw === '"dark"' || raw === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        } catch (e) { /* private mode, no localStorage — trudno */ }
    </script>
    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;color:#666">Loading…</div>
    </div>
    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:#fff3cd;color:#664d03;border-top:1px solid #ffecb5;z-index:1000">
        An unhandled error has occurred.
        <a href="" class="reload" style="margin-left:8px">Reload</a>
        <a class="dismiss" style="float:right;cursor:pointer">×</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/audioPreview.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
